<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;family=JetBrains+Mono:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#003ea8",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "surface": "#fff8f0",
                    "on-background": "#1e1b16",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#007230",
                    "surface-container-low": "#f9f3ea",
                    "tertiary-fixed-dim": "#ffb77d",
                    "surface-variant": "#e8e2d9",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "secondary-container": "#7cf994",
                    "surface-tint": "#0053db",
                    "secondary-fixed-dim": "#62df7d",
                    "on-tertiary-container": "#ffede1",
                    "primary-fixed-dim": "#b4c5ff",
                    "primary-fixed": "#dbe1ff",
                    "outline-variant": "#c3c6d7",
                    "surface-container": "#f4ede4",
                    "on-primary-fixed": "#00174b",
                    "primary": "#004ac6",
                    "surface-container-high": "#eee7de",
                    "tertiary-container": "#a65900",
                    "inverse-on-surface": "#f7f0e7",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#7ffc97",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#dfd9d0",
                    "on-secondary-fixed": "#002109",
                    "inverse-surface": "#33302a",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "surface-bright": "#fff8f0",
                    "on-surface": "#1e1b16",
                    "background": "#fff8f0",
                    "on-tertiary-fixed": "#2f1500",
                    "primary-container": "#2563eb",
                    "on-primary-container": "#eeefff",
                    "on-error": "#ffffff",
                    "inverse-primary": "#b4c5ff",
                    "surface-container-highest": "#e8e2d9",
                    "outline": "#737686",
                    "tertiary-fixed": "#ffdcc3",
                    "secondary": "#006e2d",
                    "tertiary": "#824500",
                    "on-secondary-fixed-variant": "#005320"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"],
                    "serif-display": ["DM Serif Display", "serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 12px 40px rgba(26, 24, 20, 0.06);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Navigation Suppressed for 404 Context as per Shell Visibility Rules -->
<main class="relative w-full max-w-4xl px-6 flex flex-col items-center text-center z-10">
<!-- Large "404" Watermark -->
<div class="absolute inset-0 -z-10 flex items-center justify-center pointer-events-none select-none overflow-hidden">
<span class="font-serif-display text-[22rem] md:text-[32rem] leading-none text-surface-container opacity-40 transform -translate-y-8">
                404
            </span>
</div>
<!-- Content Stack -->
<div class="space-y-8">
<header class="space-y-4">
<div class="flex justify-center mb-6">
<span class="inline-flex items-center justify-center h-16 w-16 rounded-full bg-surface-container-high text-primary">
<span class="material-symbols-outlined text-4xl">error_outline</span>
</span>
</div>
<h1 class="font-serif-display text-5xl md:text-7xl text-on-surface tracking-tight">
                    Page not found
                </h1>
<p class="max-w-md mx-auto text-on-surface-variant text-lg leading-relaxed">
                    The editorial piece you're looking for has been moved, archived, or exists only in another dimension of our AI Atelier.
                </p>
</header>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
<button class="w-full sm:w-auto px-8 py-4 rounded-lg bg-gradient-to-br from-primary-container to-primary font-label font-bold text-on-primary-container transition-all hover:scale-[1.02] active:scale-95 editorial-shadow flex items-center justify-center gap-2">
<span class="material-symbols-outlined">dashboard</span>
                    Go to Dashboard
                </button>
<button class="w-full sm:w-auto px-8 py-4 rounded-lg bg-surface-container-lowest text-on-surface font-label font-bold border border-outline-variant/40 hover:bg-surface-container-low transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">home</span>
                    Go home
                </button>
</div>
<!-- Technical Metadata (JetBrains Mono) -->
<div class="pt-12">
<div class="inline-block px-4 py-2 bg-surface-container-low rounded-lg">
<p class="font-mono text-xs text-outline flex items-center gap-2">
<span class="material-symbols-outlined text-sm">terminal</span>
                        ERR_CODE: 404_ROUTE_ABANDONED | Growth Engine Node 15
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Strip -->
<footer class="fixed bottom-0 left-0 w-full py-8 text-center">
<div class="inline-flex flex-col items-center gap-2">
<div class="h-px w-12 bg-outline-variant/30 mb-2"></div>
<p class="font-label text-[10px] tracking-widest text-on-surface-variant/60 uppercase">
                Made by The Pi Lab
            </p>
</div>
</footer>
<!-- Background Accents (Organic Structuralism) -->
<div class="fixed top-0 right-0 -z-20 w-[600px] h-[600px] bg-primary-fixed-dim/10 rounded-full blur-[120px] translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-20 w-[400px] h-[400px] bg-secondary-fixed-dim/5 rounded-full blur-[100px] -translate-x-1/4 translate-y-1/4"></div>
</body></html>
