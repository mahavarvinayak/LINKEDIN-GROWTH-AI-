<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

      background: linear-gradient(145deg, #2563eb 0%, #1d4ed8 100%);

    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
    }

      background-color: #F8F7F4;

<body class="font-body text-on-surface selection:bg-primary-fixed-dim">
<!-- Suppression of Navigation Shells: Transactional/Input focused landing page -->
<div class="min-h-screen flex flex-col justify-between items-center relative overflow-hidden">
<!-- Background Texture/Deco -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-secondary-fixed-dim blur-[100px]"></div>
</div>
<!-- Top Header Navigation (Simplified for Landing) -->
<header class="w-full px-8 py-10 flex justify-between items-center relative z-10">
<div class="flex items-center space-x-2">
<span class="font-headline text-[18px] text-primary-container tracking-tight">LinkedIn AI</span>
</div>
<div class="hidden md:flex items-center space-x-6 text-sm font-label text-on-surface-variant font-semibold tracking-wider">
<a class="hover:text-primary transition-colors uppercase" href="#">Strategy</a>
<a class="hover:text-primary transition-colors uppercase" href="#">Showcase</a>
<a class="hover:text-primary transition-colors uppercase" href="#">The Pi Lab</a>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[560px] px-6 py-12 flex flex-col items-center text-center relative z-10 flex-grow justify-center">
<!-- Badge -->
<div class="mb-8 px-4 py-1.5 bg-[#EFF6FF] rounded-full border border-blue-100/50">
<span class="text-[12px] font-label font-bold uppercase tracking-widest text-primary-container">Free · No signup needed</span>
</div>
<!-- Hero Typography -->
<h1 class="font-headline text-4xl md:text-[56px] leading-[1.1] text-on-background mb-6 tracking-tight">
        Is your LinkedIn post scroll-worthy?
      </h1>
<p class="font-body text-on-surface-variant text-lg mb-12 max-w-[420px]">
        Paste your post below to get an instant AI-powered engagement score and strategic editorial feedback.
      </p>
<!-- Input Section -->
<div class="w-full space-y-4">
<div class="relative group">
<label class="absolute -top-3 left-4 px-2 bg-[#F8F7F4] text-[10px] font-label font-extrabold uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary-container transition-colors">
            Content Draft
          </label>
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_12px_40px_rgba(26,24,20,0.04)] border border-transparent focus-within:border-primary-container/20 transition-all duration-300 min-h-[320px] flex flex-col">
<textarea class="w-full h-full flex-grow bg-transparent border-none focus:ring-0 font-mono text-[14px] leading-relaxed resize-none p-2 placeholder:text-outline/40" maxlength="3000" placeholder="Start writing or paste your post here..."></textarea>
<div class="flex justify-between items-center pt-4 border-t border-surface-container/50 mt-2">
<div class="flex space-x-3">
<button class="text-on-surface-variant hover:text-primary-container transition-colors p-1">
<span class="material-symbols-outlined text-[20px]">magic_button</span>
</button>
<button class="text-on-surface-variant hover:text-primary-container transition-colors p-1">
<span class="material-symbols-outlined text-[20px]">spellcheck</span>
</button>
</div>
<span class="font-mono text-[12px] text-on-surface-variant/60 tracking-tight">0 / 3000</span>
</div>
</div>
</div>
<button class="w-full editorial-gradient py-5 rounded-xl text-white font-label font-bold text-sm tracking-widest uppercase shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center space-x-3 group">
<span>Analyze for free</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Social Proof / Context -->
<div class="mt-16 flex items-center space-x-8 opacity-40 grayscale contrast-125">
<span class="text-[10px] font-label font-extrabold uppercase tracking-widest text-on-surface">Trusted by Authors from</span>
<div class="flex space-x-6">
<div class="h-4 w-12 bg-on-surface rounded-sm"></div>
<div class="h-4 w-16 bg-on-surface rounded-sm"></div>
<div class="h-4 w-10 bg-on-surface rounded-sm"></div>
</div>
</div>
</main>
<!-- Footer Strip -->
<footer class="w-full py-8 border-t border-surface-container/30 text-center relative z-10">
<p class="text-[11px] font-label font-bold uppercase tracking-[0.2em] text-on-surface-variant">
        Made by <span class="text-primary-container">The Pi Lab</span>
</p>
</footer>
<!-- Subtle Floating Decos -->
<div class="hidden lg:block absolute left-20 top-1/3 w-32 h-40 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover rounded-2xl rotate-3" data-alt="abstract flowing glass texture with blue and cream waves in a minimal sculptural form" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDADqQILJlweGZuMkhi-eYCfpdjM6bUak80SQNOIzF24SXMHecIkjzy0zMZRT0lfzNxWAv0x7YNs93fXZSbsXCeBHa8qxyLy2MLJ7QzQ2xMhMwUBTVjtDxLTzYlbvJJPKFvUK-TQ5fGD4jV0wsTR0-oMEIRMc-UF8F_zvRh9w2_4pueHXZuzJaNV_HmQOxNombSOdRGolvg9CH2_Bj4Hk6-0g7g7zYpUkSYt7qe34YBud5yzOsopXg8Z7x_L8i-h9I7klQMuq7fS1ch"/>
</div>
